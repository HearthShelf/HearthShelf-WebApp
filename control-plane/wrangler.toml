name = "hearthshelf-control-plane"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
# Reachable only at its custom domain (api.hearthshelf.com), not workers.dev.
workers_dev = false

# The control plane is the brain behind app.hearthshelf.com: it answers "which
# servers is this Clerk user linked to?", mints short-lived signed grant
# assertions the client redeems with an HS server directly, and runs the
# pairing-code exchange. It never holds ABS credentials and is never in the
# data path - see ../ARCHITECTURE.md.

[[d1_databases]]
binding = "DB"
database_name = "hearthshelf-control-plane"
database_id = "a35534ef-b305-4226-9426-080201cfe115"
migrations_dir = "migrations"

[vars]
# Public URL of THIS Worker - the JWT `iss` and the origin HS fetches JWKS from
# (${CP_ISSUER}/.well-known/jwks.json). Must be the Worker's hostname, NOT the
# SPA's (app.hearthshelf.com). Set as a custom domain on this Worker in CF.
CP_ISSUER = "https://api.hearthshelf.com"
# Clerk's JWKS endpoint for verifying session tokens. The host is the Frontend
# API domain (encoded in the publishable key); change per Clerk instance.
CLERK_JWKS_URL = "https://clerk.hearthshelf.com/.well-known/jwks.json"
# Grant assertion lifetime in seconds (short = revocation via expiry).
GRANT_TTL_SECONDS = "300"
# Pairing code lifetime in seconds.
PAIRING_TTL_SECONDS = "900"
# Default From: address for outbound email sent via Resend.
EMAIL_FROM = "no-reply@hearthshelf.com"
# CORS allowlist of SPA origin(s) permitted to call this API (comma-separated).
# Pinned - the API never reflects arbitrary origins. Add localhost/preview here
# during dev, e.g. "https://app.hearthshelf.com,http://localhost:5173".
APP_ORIGINS = "https://app.hearthshelf.com"

# Secrets (set via `wrangler secret put <NAME>`), never committed:
#   CP_SIGNING_JWK   - the control plane's PRIVATE signing key (JSON JWK, EdDSA)
#   CLERK_SECRET_KEY - Clerk backend key (sk_...), for creating invitations
#   RESEND_API_KEY   - Resend key (re_...), for sending email from hearthshelf.com
# The matching public key is derived and served at /.well-known/jwks.json.
