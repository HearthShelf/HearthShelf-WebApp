name = "hearthshelf-control-plane"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
# Reachable only at its custom domain (api.hearthshelf.com), not workers.dev.
workers_dev = false

# The control plane is the brain behind app.hearthshelf.com: it answers "which
# servers is this Clerk user linked to?", mints short-lived signed grant
# assertions the client redeems with an HS server directly, and runs the
# pairing-code exchange. It never holds ABS credentials and is never in the
# data path - see ../ARCHITECTURE.md.

# Refresh the cached "latest HearthShelf release" from the GitHub Releases API
# every 6 hours (src/index.ts scheduled handler -> refreshLatestRelease). The SPA
# reads the cache at GET /releases/latest to drive update prompts.
[triggers]
crons = ["0 */6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "hearthshelf-control-plane"
database_id = "a35534ef-b305-4226-9426-080201cfe115"
migrations_dir = "migrations"

# Service binding to the isolated log-collector Worker. The control plane forwards
# its own + boxes' warn/error logs to it and proxies the admin viewer's reads
# through it - so the CP NEVER binds the logs DB directly (only the collector
# does). Worker-to-Worker, no public hop. The forward/read calls carry the
# x-cp-forward header = LOG_INGEST_TOKEN (the collector's internal gate).
[[services]]
binding = "LOG_COLLECTOR"
service = "hearthshelf-log-collector"

[vars]
# Public URL of THIS Worker - the JWT `iss` and the origin HS fetches JWKS from
# (${CP_ISSUER}/.well-known/jwks.json). Must be the Worker's hostname, NOT the
# SPA's (app.hearthshelf.com). Set as a custom domain on this Worker in CF.
CP_ISSUER = "https://api.hearthshelf.com"
# Clerk's JWKS endpoint for verifying session tokens. The host is the Frontend
# API domain (encoded in the publishable key); change per Clerk instance.
CLERK_JWKS_URL = "https://clerk.hearthshelf.com/.well-known/jwks.json"
# Grant assertion lifetime in seconds (short = revocation via expiry).
GRANT_TTL_SECONDS = "300"
# Pairing code lifetime in seconds.
PAIRING_TTL_SECONDS = "900"
# Default From: address for outbound email sent via Resend.
EMAIL_FROM = "no-reply@hearthshelf.com"
# Per-server monthly send cap for the hosted email relay (POST /email/send).
# A generous free allowance; the paid tier later raises this per server. The box
# can deliver e-reader books + test mail through us without its own SMTP.
EMAIL_RELAY_MONTHLY_CAP = "500"
# CORS allowlist of SPA origin(s) permitted to call this API (comma-separated).
# Pinned - the API never reflects arbitrary origins. Add localhost/preview here
# during dev, e.g. "https://app.hearthshelf.com,http://localhost:5173".
APP_ORIGINS = "https://app.hearthshelf.com"
# Platform admins (who can moderate the fleet, manage plans, and read the infra log
# viewer) live in the platform_admins D1 table - granted/revoked at runtime via the
# admin panel and audited - NOT in an env var. The bootstrap operator is seeded by
# email in migration 0006; their clerk_user_id is backfilled on first sign-in.

# --- hs.direct (automatic HTTPS for self-hosters) ---
# Base zone for hs.direct hostnames (POC). Production swaps to "hearthshelf.app".
# When unset, the cert-grant endpoint reports hsdirect_not_configured. Also gates
# the OIDC redirect-pinning to the stable <hash>.<zone> host.
HSDIRECT_ZONE = "d.hearthshelf.com"
# Public base URL of the VPS cert broker (resolves to the RackNerd box via the
# ns1.d glue record). The HS box POSTs its CSR + a CP grant here to get a cert.
HSDIRECT_BROKER_URL = "https://ns1.d.hearthshelf.com:8443"
# Cert-broker grant lifetime in seconds (short = the box must request right
# before issuing). Defaults to 300 when unset.
CERT_GRANT_TTL_SECONDS = "300"

# Secrets (set via `wrangler secret put <NAME>`), never committed:
#   CP_SIGNING_JWK   - the control plane's PRIVATE signing key (JSON JWK, EdDSA)
#   CLERK_SECRET_KEY - Clerk backend key (sk_...), for creating invitations
#   RESEND_API_KEY   - Resend key (re_...), for sending email from hearthshelf.com
#   LOG_INGEST_TOKEN - shared token for the log-collector's internal routes (the
#                      x-cp-forward header); same value as the collector secret
# The matching public key is derived and served at /.well-known/jwks.json.
