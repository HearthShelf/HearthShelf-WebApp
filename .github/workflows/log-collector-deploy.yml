name: Log Collector Deploy

# Auto-deploy the isolated log-collector Worker whenever its code lands on main.
# Applies any new D1 migrations (hearthshelf-logs) first, then deploys.
# workflow_dispatch lets you redeploy by hand (e.g. after rotating the ingest
# token) without a code change.
on:
  push:
    branches:
      - main
    paths:
      - "log-collector/**"
      - ".github/workflows/log-collector-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: log-collector-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: log-collector
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: log-collector/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply hearthshelf-logs --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
