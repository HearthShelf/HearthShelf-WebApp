name: Control Plane CI

# Typecheck the control plane on every PR that touches it, so broken
# Worker code never reaches main (and therefore never auto-deploys).
on:
  pull_request:
    paths:
      - "control-plane/**"
      - ".github/workflows/control-plane-ci.yml"

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: control-plane/package-lock.json

      - run: npm ci

      - run: npm run typecheck
