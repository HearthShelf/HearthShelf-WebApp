name: Control Plane Deploy

# Auto-deploy the Cloudflare Worker whenever control-plane code lands on main.
# Applies any new D1 migrations first, then deploys. workflow_dispatch lets you
# redeploy by hand (e.g. after rotating a secret) without a code change.
on:
  push:
    branches:
      - main
    paths:
      - 'control-plane/**'
      - '.github/workflows/control-plane-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

# Never let two deploys race; cancel an in-flight one if a newer push lands.
concurrency:
  group: control-plane-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: control-plane/package-lock.json

      - run: npm ci

      # Catch type errors here too: a direct push to main skips PR CI.
      - name: Typecheck
        run: npm run typecheck

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply hearthshelf-control-plane --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
