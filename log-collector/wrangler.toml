name = "hearthshelf-log-collector"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
# Reachable only at its custom domain (logs.hearthshelf.com) for the VPS intake,
# plus a service binding from the control plane. Not on workers.dev.
workers_dev = false

# Public hostname the VPS broker POSTs /ingest/vps to: logs.hearthshelf.com.
# The custom domain is attached OUT OF BAND (Cloudflare dashboard / a one-time
# `wrangler deploy` with a full-permission login), same as the control plane's
# api.hearthshelf.com - it is intentionally NOT a [[routes]] block here, because
# the CI deploy token is scoped to Workers Scripts + D1, not zone Workers Routes,
# and re-asserting the route on every deploy would fail with a 10000 auth error.
# The service-binding paths (/ingest, /logs) don't need the hostname at all.

# Isolated infra-log sink. This Worker exists SEPARATELY from the control plane on
# purpose: its only public surface is a log-ingest endpoint the off-Cloudflare VPS
# broker can reach, so it must NOT share an isolate with the control plane's
# signing key / Clerk secret / control-plane DB. It holds exactly one binding
# (LOGS_DB) and one ingest secret - compromise it and the blast radius is "someone
# can write log rows", nothing more. See ../ARCHITECTURE.md.

# Dedicated logs database - distinct from hearthshelf-control-plane. Create with:
#   wrangler d1 create hearthshelf-logs
# then paste the returned database_id below.
[[d1_databases]]
binding = "LOGS_DB"
database_name = "hearthshelf-logs"
database_id = "56565821-5038-475a-bfe9-6609bd45978b"
migrations_dir = "migrations"

[vars]
# Minimum severity accepted. Anything below this is dropped at the door so the DB
# stays error-focused and small. Order: debug < info < warn < error.
LOG_MIN_SEVERITY = "warn"
# Days to retain rows; an opportunistic sweep on write deletes older rows.
LOG_RETENTION_DAYS = "30"

# Secrets (set via `wrangler secret put <NAME>`), never committed:
#   LOG_INGEST_TOKEN - bearer token the VPS broker presents on POST /ingest/vps.
#                      This is the ONLY credential this Worker holds.
